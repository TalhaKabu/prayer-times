name: frontend_flutter
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  flutter_svg: ^2.2.4
  rive: ^0.12.4
  memory_cache: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/inter.ttf

  assets:
    - assets/
    - assets/svgs/
    - assets/jsons/
